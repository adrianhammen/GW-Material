<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3B6D11">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Materiallager · Graue Wölfe</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f5f5f2;color:#1a1a18;font-size:16px}
input,button,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer}
:root{
  --g:#3B6D11;--gd:#27500A;--gl:#EAF3DE;--gm:#97C459;
  --a:#854F0B;--al:#FAEEDA;
  --r:#A32D2D;--rl:#FCEBEB;
  --mu:#6B6A65;--bo:rgba(0,0,0,0.1);
  --ca:#ffffff;--bg:#f5f5f2;
}
/* APP SHELL */
#app{height:100vh;height:100dvh;height:-webkit-fill-available;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--ca);position:relative;overflow:hidden}
#scr-login{position:absolute;inset:0;background:var(--ca);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:200}
#scr-app{display:none;flex-direction:column;height:100%;min-height:0}
/* HEADER */
.hdr{background:var(--g);padding:14px 16px 12px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.hdr-title{color:#EAF3DE;font-size:18px;font-weight:500}
.hdr-sub{color:var(--gm);font-size:10px;letter-spacing:.07em;margin-bottom:2px}
.hdr-user{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;color:#EAF3DE;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.page{display:none;padding:14px 14px 20px}
.page.active{display:block}
/* BOTTOM NAV */
.bnav{background:var(--ca);border-top:.5px solid var(--bo);display:flex;flex-shrink:0;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;padding:8px 2px 10px;border:none;background:transparent;color:var(--mu);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s}
.nb.active{color:var(--g)}
.nb svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
/* CARDS */
.card{background:var(--ca);border:.5px solid var(--bo);border-radius:12px;padding:12px 14px;margin-bottom:8px}
/* SECTION LABEL */
.sl{font-size:11px;font-weight:600;color:var(--mu);letter-spacing:.07em;margin:14px 0 7px}
/* ART ICON */
.aico{width:38px;height:38px;border-radius:9px;background:var(--gl);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--g)}
.aico svg{width:18px;height:18px;stroke-width:2;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
/* AVAIL BAR */
.abar{height:3px;border-radius:2px;background:#e8e8e4;overflow:hidden;flex:1}
.afill{height:100%;border-radius:2px;background:var(--g);transition:width .3s}
.afill.am{background:var(--a)}
.afill.re{background:var(--r)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px}
.bg{background:var(--gl);color:var(--gd)}
.ba{background:var(--al);color:var(--a)}
.br{background:var(--rl);color:var(--r)}
.bgy{background:#ebebea;color:var(--mu)}
.bbl{background:#E6F1FB;color:#0C447C}
/* SEARCH */
.sw{display:flex;align-items:center;gap:8px;background:var(--bg);border:.5px solid var(--bo);border-radius:10px;padding:9px 12px;margin-bottom:12px}
.sw input{border:none;background:transparent;flex:1;outline:none;font-size:14px;color:#1a1a18}
.sw input::placeholder{color:var(--mu)}
.sw svg{width:16px;height:16px;stroke:var(--mu);flex-shrink:0;fill:none;stroke-linecap:round;stroke-linejoin:round}
/* FILTER PILLS */
.fscroll{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.fscroll::-webkit-scrollbar{display:none}
.pill{border:.5px solid var(--bo);border-radius:20px;padding:5px 12px;font-size:12px;background:var(--ca);color:var(--mu);white-space:nowrap;cursor:pointer}
.pill.active{background:var(--g);color:#EAF3DE;border-color:var(--g)}
/* STAT GRID */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.scard{background:var(--ca);border:.5px solid var(--bo);border-radius:10px;padding:11px}
.scard p:first-child{font-size:11px;color:var(--mu);margin-bottom:3px}
.scard p:last-child{font-size:22px;font-weight:500}
/* BUTTONS */
.btn{border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:500;cursor:pointer}
.bp{background:var(--g);color:#EAF3DE}
.bs{background:var(--bg);border:.5px solid var(--bo);color:#1a1a18}
.bd{background:var(--rl);color:var(--r)}
.bfull{width:100%}
.bsm{padding:7px 14px;font-size:13px;border-radius:8px}
/* COUNTER */
.ctr{display:flex;align-items:center;gap:10px}
.cbtn{width:32px;height:32px;border:.5px solid var(--bo);border-radius:8px;background:var(--ca);font-size:18px;display:flex;align-items:center;justify-content:center;color:#1a1a18;line-height:1}
.cval{font-size:16px;font-weight:500;min-width:24px;text-align:center}
/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--mu);margin-bottom:5px;display:block}
.fi{width:100%;border:.5px solid var(--bo);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--bg);outline:none}
.fi:focus{border-color:var(--g)}
select.fi{appearance:none;-webkit-appearance:none}
textarea.fi{resize:vertical;min-height:80px}
/* MODAL */
.mbk{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;padding-bottom:0}
.mbk.open{display:flex}
.mc{background:var(--ca);border-radius:20px 20px 0 0;padding:10px 16px 40px;width:100%;max-height:92vh;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.mh{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.mt{font-size:17px;font-weight:500;margin-bottom:16px}
/* LOC BADGE */
.loc{background:var(--bg);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--mu);display:inline-flex;align-items:center;gap:3px}
/* KALKULATOR */
.zrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:.5px solid var(--bo)}
.zrow:last-child{border-bottom:none}
.citm{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--bo)}
.citm:last-child{border-bottom:none}
.citm.excl{opacity:.4}
.xtog{width:24px;height:24px;border:.5px solid var(--bo);border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;color:var(--mu)}
.xtog.on{background:var(--rl);border-color:var(--r);color:var(--r)}
/* REPARATUR */
.rrow{background:var(--ca);border:.5px solid var(--bo);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
/* ADMIN */
.asec{margin-bottom:24px}
.asec-t{font-size:14px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
/* LIST ITEM */
.li{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:.5px solid var(--bo);cursor:pointer}
.li:last-child{border-bottom:none}
/* LOGIN */
.llogo{width:68px;height:68px;background:var(--gl);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.llogo svg{width:34px;height:34px;stroke:var(--g);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
/* TOAST */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.empty svg{width:40px;height:40px;stroke:var(--mu);margin:0 auto 12px;display:block;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
/* DIVIDER */
.div{height:.5px;background:var(--bo);margin:16px 0}
/* MODE TOGGLE */
.mtog{display:flex;background:var(--bg);border:.5px solid var(--bo);border-radius:10px;overflow:hidden;margin-bottom:16px}
.mb{flex:1;padding:9px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--mu);cursor:pointer}
.mb.on{background:var(--g);color:#EAF3DE}
/* REQ ITEM ROW */
.rirow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:.5px solid var(--bo)}
.rirow:last-child{border-bottom:none}
/* CHEVRON SVG */
.chev{width:16px;height:16px;flex-shrink:0;fill:none;stroke:var(--mu);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* REQUEST CARD */
.rcard{background:var(--ca);border:.5px solid var(--bo);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
/* FLOATING DRAFT BANNER */
#draft-banner{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:452px;background:var(--g);color:#EAF3DE;border-radius:12px;padding:12px 14px;display:none;align-items:center;justify-content:space-between;z-index:40;box-shadow:0 4px 16px rgba(0,0,0,.2)}
#draft-banner.show{display:flex}
</style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>

  <!-- ═══ LOGIN ═══ -->
  <div id="scr-login">
    <div class="llogo">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

async function doLogin() {
  if (!db) { showErr('Firebase nicht konfiguriert – bitte SETUP.md lesen'); return; }
  const name  = document.getElementById('li-name').value.trim();
  const email = document.getElementById('li-email').value.trim().toLowerCase();
  if (!name)  { showErr('Bitte Namen eingeben'); return; }
  if (!email || !email.includes('@')) { showErr('Bitte gültige E-Mail eingeben'); return; }
  try {
    await db.collection('users').doc(email).set({name,email,lastLogin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    usr = {name,email};
    localStorage.setItem('gw_u', JSON.stringify(usr));
    launchApp();
  } catch(e) { showErr('Verbindungsfehler: ' + e.message); }
}

function showErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg;
  el.style.display = 'block';
}

document.getElementById('li-email').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('li-name').addEventListener('keydown',  e => { if(e.key==='Enter') document.getElementById('li-email').focus(); });

function showUserMenu() {
  openModal(`
    <div class="mt">Mein Konto</div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:56px;height:56px;background:var(--gl);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--g);margin:0 auto 10px">${ini(usr.name)}</div>
      <div style="font-size:16px;font-weight:500">${esc(usr.name)}</div>
      <div style="font-size:13px;color:var(--mu)">${esc(usr.email)}</div>
      ${isAdm ? '<span class="badge bg" style="margin-top:6px">Admin</span>' : ''}
    </div>
    <button class="btn bd bfull" onclick="doLogout()">Abmelden</button>
  `);
}

function doLogout() {
  localStorage.removeItem('gw_u');
  unsubs.forEach(u=>u());
  location.reload();
}

// ═══════════════════════════════════════════════════════════════
//  APP LAUNCH
// ═══════════════════════════════════════════════════════════════
async function launchApp() {
  document.getElementById('scr-login').style.display = 'none';
  const appEl = document.getElementById('scr-app');
  appEl.style.display = 'flex';
  appEl.style.flexDirection = 'column';
  appEl.style.height = '100%';
  document.getElementById('hdr-user').textContent = ini(usr.name);

  await seedIfEmpty();

  const cfgSnap = await db.collection('config').doc('main').get({source:'server'}).catch(()=>db.collection('config').doc('main').get());
  if (cfgSnap.exists) {
    admEmails = cfgSnap.data().adminEmails || [INIT_ADMIN];
    kalCfg    = cfgSnap.data().kalkulatorConfig || JSON.parse(JSON.stringify(KAL_DEFAULT));
  }
  isAdm = admEmails.includes(usr.email);
  if (isAdm) document.getElementById('nav-admin').style.display = 'flex';

  listenAll();
}

async function seedIfEmpty() {
  const snap = await db.collection('articles').limit(1).get();
  if (!snap.empty) return;
  await db.collection('config').doc('main').set({
    adminEmails:[INIT_ADMIN],
    kalkulatorConfig:KAL_DEFAULT
  });
  const batch = db.batch();
  let ord = 0;
  for (const [kat,items] of Object.entries(KATS)) {
    for (const name of items) {
      const ref = db.collection('articles').doc();
      batch.set(ref,{name,kategorie:kat,total:0,available:0,location:'',locationType:'lose',notes:'',archived:false,order:ord++,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
  }
  await batch.commit();
}

function listenAll() {
  unsubs.push(db.collection('articles').where('archived','==',false).onSnapshot(s=>{
    arts = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    renderPage();
  }));
  unsubs.push(db.collection('requests').orderBy('createdAt','desc').onSnapshot(s=>{
    reqs = s.docs.map(d=>({id:d.id,...d.data()}));
    if(curPage==='anfragen') renderAnfragen();
  }));
  unsubs.push(db.collection('repairs').orderBy('createdAt','desc').onSnapshot(s=>{
    reps = s.docs.map(d=>({id:d.id,...d.data()}));
    if(curPage==='reparatur') renderReparatur();
  }));
  unsubs.push(db.collection('bookings').orderBy('date','desc').limit(60).onSnapshot(s=>{
    bkgs = s.docs.map(d=>({id:d.id,...d.data()}));
  }));
  unsubs.push(db.collection('config').doc('main').onSnapshot(s=>{
    if(!s.exists) return;
    admEmails = s.data().adminEmails || [INIT_ADMIN];
    kalCfg    = s.data().kalkulatorConfig || JSON.parse(JSON.stringify(KAL_DEFAULT));
    const wasAdmin = isAdm;
    isAdm = admEmails.includes(usr.email);
    if(isAdm) document.getElementById('nav-admin').style.display='flex';
    if(!wasAdmin && isAdm) { renderPage(); showToast('Du hast jetzt Admin-Rechte'); }
    else if(curPage==='admin') renderAdmin();
    else if(curPage==='kalkulator') renderKalkulator();
  }));
}

function nav(page) {
  if (!isAdm && page==='admin') return;
  curPage = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  document.getElementById('hdr-title').textContent = PAGE_TITLES[page];
  renderPage();
}

function renderPage() {
  switch(curPage){
    case 'uebersicht':  renderUebersicht(); break;
    case 'anfragen':    renderAnfragen();   break;
    case 'kalkulator':  renderKalkulator(); break;
    case 'reparatur':   renderReparatur();  break;
    case 'admin':       renderAdmin();      break;
  }
}

function renderUebersicht() {
  const total = arts.reduce((s,a)=>s+(a.total||0),0);
  const avail = arts.reduce((s,a)=>s+(a.available||0),0);
  const out   = total - avail;
  const repOpen = reps.filter(r=>r.status!=='erledigt').length;
  document.getElementById('stat-grid').innerHTML=`
    <div class="scard"><p>Artikel gesamt</p><p>${total}</p></div>
    <div class="scard"><p>Verfügbar</p><p style="color:var(--g)">${avail}</p></div>
    <div class="scard"><p>Ausgeliehen</p><p style="color:var(--a)">${out}</p></div>
    <div class="scard"><p>Reparatur</p><p style="color:var(--r)">${repOpen}</p></div>`;

  const cats=['Alle',...Object.keys(KATS)];
  document.getElementById('filter-pills').innerHTML = cats.map(c=>
    `<button class="pill${actFilt===c?' active':''}" onclick="setFilt('${c}')">${c}</button>`).join('');
  renderArtList();
}

function setFilt(c){actFilt=c;renderUebersicht();}
function filterArt(){srchQ=document.getElementById('search-inp').value.toLowerCase();renderArtList();}

function renderArtList() {
  let items = arts;
  if(actFilt!=='Alle') items=items.filter(a=>a.kategorie===actFilt);
  if(srchQ) items=items.filter(a=>a.name.toLowerCase().includes(srchQ));
  if(!items.length){
    document.getElementById('art-list').innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg><p>Kein Material gefunden</p></div>';
    return;
  }
  let html='';
  if(actFilt==='Alle'&&!srchQ){
    for(const [kat] of Object.entries(KATS)){
      const ki=items.filter(a=>a.kategorie===kat);
      if(!ki.length) continue;
      html+=`<div class="sl">${kat.toUpperCase()}</div>`+ki.map(artCard).join('');
    }
    const unk=items.filter(a=>!Object.keys(KATS).includes(a.kategorie));
    if(unk.length) html+=`<div class="sl">SONSTIGES</div>`+unk.map(artCard).join('');
  } else {
    html=items.map(artCard).join('');
  }
  document.getElementById('art-list').innerHTML=html;
}

function artCard(a) {
  const pct = a.total>0?Math.round((a.available/a.total)*100):0;
  const fc  = pct>=50?'':pct>=25?' am':' re';
  const cc  = pct>=50?'var(--g)':pct>=25?'var(--a)':'var(--r)';
  return `<div class="card" style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openArt('${a.id}')">
    <div class="aico">${katIcon(a.kategorie)}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:500">${esc(a.name)}</span>
        <span style="font-size:13px;font-weight:500;color:${cc};white-space:nowrap">${a.available} / ${a.total}</span>
      </div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:5px">
        ${a.location?`<span class="loc">📦 ${a.location}</span>`:'<span class="loc" style="color:#ccc">—</span>'}
        <div class="abar"><div class="afill${fc}" style="width:${pct}%"></div></div>
      </div>
    </div>
  </div>`;
}

}

function adjBQ(d){ bookQty=Math.max(1,bookQty+d); const el=document.getElementById('bk-qty'); if(el) el.textContent=bookQty; }

async function doBook(artId, type) {
  const ev  = document.getElementById('bk-ev').value.trim();
  const qty = bookQty;
  const a   = arts.find(x=>x.id===artId); if(!a) return;
  let newAv = a.available;
  if(type==='out'){
    if(qty>a.available){showToast('Nicht genug verfügbar');return;}
    newAv = a.available - qty;
  } else {
    newAv = Math.min(a.total, a.available+qty);
  }
  await db.collection('articles').doc(artId).update({available:newAv});
  await db.collection('bookings').add({
    articleId:artId,articleName:a.name,quantity:qty,type,
    userEmail:usr.email,userName:usr.name,
    event:ev||'—',date:firebase.firestore.FieldValue.serverTimestamp()
  });
  bookQty=1; mClose();
  showToast(type==='out'?`${qty}× ausgebucht`:`${qty}× eingebucht`);
}

function openEditArt(id) {
  const a=arts.find(x=>x.id===id); if(!a) return;
  const locOpts=['',... REGAL_COLS.flatMap(c=>REGAL_ROWS.map(r=>`${c}-${r}`))];
  openModal(`
    <div class="mt">Artikel bearbeiten</div>
    <div class="fg"><label class="fl">Name</label><input class="fi" id="ea-name" value="${esc(a.name)}"></div>
    <div class="fg"><label class="fl">Kategorie</label>
      <select class="fi" id="ea-kat">${[...Object.keys(KATS),'Sonstiges'].map(k=>`<option${k===a.kategorie?' selected':''}>${k}</option>`).join('')}</select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fg"><label class="fl">Gesamtanzahl</label><input class="fi" id="ea-tot" type="number" min="0" value="${a.total}"></div>
    </div>
    <div class="fg"><label class="fl">Lagerort</label>
      <select class="fi" id="ea-loc">${locOpts.map(l=>`<option${l===a.location?' selected':''}>${l}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Lagertyp</label>
      <select class="fi" id="ea-ltype">
        <option value="lose"${a.locationType!=='kiste'?' selected':''}>Lose</option>
        <option value="kiste"${a.locationType==='kiste'?' selected':''}>In einer Kiste</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Notizen</label><input class="fi" id="ea-notes" value="${esc(a.notes||'')}"></div>
    <button class="btn bp bfull" style="margin-bottom:8px" onclick="saveArt('${id}')">Speichern</button>
    <button class="btn bd bfull" onclick="archiveArt('${id}')">Archivieren</button>
  `);
}

async function saveArt(id) {
  const name=document.getElementById('ea-name').value.trim();
  if(!name){showToast('Name erforderlich');return;}
  const newTotal = parseInt(document.getElementById('ea-tot').value)||0;
  const oldArt = arts.find(x=>x.id===id);
  const booked = oldArt ? Math.max(0, oldArt.total - oldArt.available) : 0;
  const newAvail = Math.max(0, newTotal - booked);
  await db.collection('articles').doc(id).update({
    name,
    kategorie:document.getElementById('ea-kat').value,
    total:newTotal,
    available:newAvail,
    location:document.getElementById('ea-loc').value,
    locationType:document.getElementById('ea-ltype').value,
    notes:document.getElementById('ea-notes').value.trim()
  });
  mClose(); showToast('Gespeichert');
}

async function archiveArt(id) {
  if(!confirm('Artikel wirklich archivieren?')) return;
  await db.collection('articles').doc(id).update({archived:true});
  mClose(); showToast('Archiviert');
}

function addToDraft(artId) {
  const a=arts.find(x=>x.id===artId); if(!a) return;
  const ex=draft.items.find(i=>i.artId===artId);
  if(ex){ex.menge++;}else{draft.items.push({artId,name:a.name,menge:1,excluded:false});}
  updateDraftBanner();
  showToast(`${a.name} hinzugefügt`);
}

function updateDraftBanner() {
  const b=document.getElementById('draft-banner');
  const active=draft.items.length>0;
  b.classList.toggle('show',active);
  document.getElementById('draft-count').textContent=draft.items.length+' Artikel';
}

function openDraftAnfrage(){nav('anfragen');setTimeout(openNewAnfrage,80);}

function renderAnfragen() {
  const el=document.getElementById('anf-content');
  if(isAdm) {
    const pend=reqs.filter(r=>r.status==='ausstehend');
    const actv=reqs.filter(r=>r.status==='in_arbeit'||r.status==='bereit');
    const done=reqs.filter(r=>r.status==='abgeholt');
    let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="font-size:17px;font-weight:500">Anfragen</h2>
    </div>`;
    if(!reqs.length) h+=emptyState('Keine Anfragen vorhanden');
    else {
      if(pend.length) h+=`<div class="sl">AUSSTEHEND (${pend.length})</div>`+pend.map(r=>reqCard(r)).join('');
      if(actv.length) h+=`<div class="sl">IN BEARBEITUNG</div>`+actv.map(r=>reqCard(r)).join('');
      if(done.length) h+=`<div class="sl">ABGEHOLT</div>`+done.map(r=>reqCard(r)).join('');
    }
    el.innerHTML=h;
  } else {
    const mine=reqs.filter(r=>r.userEmail===usr.email);
    let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="font-size:17px;font-weight:500">Meine Anfragen</h2>
      <button class="btn bp bsm" onclick="openNewAnfrage()">+ Neue Anfrage</button>
    </div>`;
    if(!mine.length) h+=emptyState('Noch keine Anfragen gestellt');
    else h+=mine.map(r=>reqCard(r)).join('');
    el.innerHTML=h;
  }
}

function reqCard(r) {
  const s=STATUS_MAP[r.status]||STATUS_MAP.ausstehend;
  const cnt=(r.items||[]).filter(i=>!i.excluded).length;
  return `<div class="rcard" onclick="openReq('${r.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
      <div>
        <p style="font-size:14px;font-weight:500">${esc(r.eventName||'Anfrage')}</p>
        <p style="font-size:12px;color:var(--mu)">${isAdm?esc(r.userName)+' · ':''}${r.eventDate||''}</p>
      </div>
      <span class="badge ${s.c}">${s.l}</span>
    </div>
    <p style="font-size:13px;color:var(--mu)">${cnt} Artikel</p>
  </div>`;
}

  openModal(`

    <div class="fg"><label class="fl">Datum</label><input class="fi" id="an-dt" type="date" value="${draft.eventDate}"></div>
    <div class="div"></div>
    <p style="font-size:13px;color:var(--mu);margin-bottom:10px">Artikel aus der Übersicht oder dem Kalkulator hinzufügen:</p>
    <div id="draft-item-list"></div>
    <button class="btn bs bfull bsm" style="margin-bottom:14px" onclick="openArtPicker()">+ Artikel hinzufügen</button>
    <button class="btn bp bfull" onclick="submitAnfrage()">Anfrage einreichen</button>
  `);

function renderDraftList() {
  const el=document.getElementById('draft-item-list'); if(!el) return;
  if(!draft.items.length){el.innerHTML='<p style="font-size:13px;color:var(--mu);text-align:center;padding:8px 0 12px">Noch keine Artikel</p>';return;}

async function bookReq(id) {
  const r=reqs.find(x=>x.id===id); if(!r) return;
  const toBook=(r.items||[]).filter(i=>!i.excluded);
  for(const it of toBook){
    const a=arts.find(x=>x.name===it.name||x.id===it.artId);
    if(!a) continue;
    const nav2=Math.max(0,a.available-it.menge);
    await db.collection('articles').doc(a.id).update({available:nav2});
    await db.collection('bookings').add({
      articleId:a.id,articleName:a.name,quantity:it.menge,type:'out',
      userEmail:usr.email,userName:usr.name,
      event:r.eventName,date:firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  await db.collection('requests').doc(id).update({status:'in_arbeit'});
  mClose(); showToast('Material ausgebucht');
}

function renderKalkulator() {
  const types=Object.keys(kalCfg);
  const zRows=types.map(t=>{
    const cnt=kalZelte[t]||0;
    const sid='kz_'+t.replace(/[^a-z0-9]/gi,'_');
    return `<div class="zrow">
      <div><p style="font-size:14px;font-weight:500">${t}</p></div>
      <div class="ctr">
        <button class="cbtn" onclick="adjKal('${t}',-1)">−</button>
        <span class="cval" id="${sid}">${cnt}</span>
        <button class="cbtn" onclick="adjKal('${t}',1)">+</button>
      </div>
    </div>`;
  }).join('');

  const needed=calcNeeded();
  const hasItems=Object.keys(needed).length>0;

  let calcH='';
  if(hasItems){
    const rows=Object.entries(needed).map(([name,qty])=>{
      const a=arts.find(x=>x.name===name);
      const av=a?a.available:0;
      const ok=av>=qty;
      const excl=kalExcl.has(name);
      return `<div class="citm${excl?' excl':''}">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="xtog${excl?' on':''}" onclick="togKalExcl('${name}')" title="${excl?'Einschließen':'Ausschließen'}">✕</button>
          <div>
            <p style="font-size:13px;font-weight:500">${esc(name)}</p>
            <p style="font-size:11px;color:var(--mu)">${qty} ben. · ${av} verf.</p>
          </div>
        </div>
        <span class="badge ${ok?'bg':'br'}">${ok?'✓ ok':'⚠ knapp'}</span>
      </div>`;
    }).join('');
    calcH=`<div class="sl">BENÖTIGTES MATERIAL</div>
      <div style="background:var(--ca);border:.5px solid var(--bo);border-radius:12px;overflow:hidden;margin-bottom:12px">${rows}</div>
      ${isAdm
        ?`<button class="btn bp bfull" style="margin-bottom:8px" onclick="bookFromKal()">Direkt ausbuchen</button>`
        :`<button class="btn bp bfull" style="margin-bottom:8px" onclick="anfrageFromKal()">Als Anfrage einreichen</button>`}`;
  }

  document.getElementById('kal-content').innerHTML=`
    <h2 style="font-size:17px;font-weight:500;margin-bottom:4px">Lagerkalkulator</h2>
    <p style="font-size:13px;color:var(--mu);margin-bottom:14px">Wähle die benötigten Zelte</p>
    <div style="background:var(--ca);border:.5px solid var(--bo);border-radius:12px;padding:0 14px;margin-bottom:14px">${zRows}</div>
    ${calcH}`;
}

function adjKal(t,d){kalZelte[t]=Math.max(0,(kalZelte[t]||0)+d);renderKalkulator();}
function togKalExcl(n){if(kalExcl.has(n))kalExcl.delete(n);else kalExcl.add(n);renderKalkulator();}

function calcNeeded(){
  const r={};
  for(const [t,cnt] of Object.entries(kalZelte)){
    if(!cnt) continue;
    const cfg=kalCfg[t]; if(!cfg) continue;
    for(const it of cfg.items) r[it.n]=(r[it.n]||0)+it.m*cnt;
  }
  return r;
}

async function bookFromKal(){
  const needed=calcNeeded();
  const toBook=Object.entries(needed).filter(([n])=>!kalExcl.has(n));
  for(const [name,qty] of toBook){
    const a=arts.find(x=>x.name===name); if(!a) continue;
    await db.collection('articles').doc(a.id).update({available:Math.max(0,a.available-qty)});
    await db.collection('bookings').add({
      articleId:a.id,articleName:name,quantity:qty,type:'out',
      userEmail:usr.email,userName:usr.name,
      event:'Kalkulator',date:firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  kalZelte={}; kalExcl.clear();
  showToast('Material ausgebucht'); renderKalkulator();
}

function anfrageFromKal(){
  const needed=calcNeeded();
  draft.items=Object.entries(needed)
    .filter(([n])=>!kalExcl.has(n))
    .map(([name,menge])=>({artId:arts.find(x=>x.name===name)?.id||'',name,menge,excluded:false}));
  updateDraftBanner();
  nav('anfragen');
  setTimeout(openNewAnfrage,100);
}

function renderReparatur() {

      <p style="font-size:11px;color:var(--mu)">${r.location?esc(r.location)+' · ':''}${fmtDate(r.createdAt)}</p>

}

  return items.map((it,i)=>`

      <input class="fi" id="ki-n-${i}" value="${esc(it.n)}" placeholder="Artikelname" style="flex:2;padding:7px 9px">

function getKalRows(){
  const wrap=document.getElementById('kal-edit-wrap');

  const items=[];

    const n=document.getElementById(`ki-n-${i}`);
    const m=document.getElementById(`ki-m-${i}`);
    if(n&&n.value.trim()) items.push({n:n.value.trim(),m:parseInt(m?.value)||1});
  }
  return items;
}

  const items=getKalRows().filter((_,i)=>i!==idx);
  document.getElementById('kal-edit-wrap').innerHTML=renderKalItems(items);

  await db.collection('config').doc('main').update({kalkulatorConfig:newCfg});
  mClose(); showToast('Zelttyp gelöscht');
}

  openModal(`
    <div class="mt">Neuer Zelttyp</div>
    <div class="fg"><label class="fl">Name des Zelttyps</label><input class="fi" id="nkt-n" placeholder="z.B. Kröte"></div>
    <button class="btn bp bfull" onclick="saveNewKalTyp()">Erstellen</button>
  `);
}

async function saveNewKalTyp(){
  const name=document.getElementById('nkt-n').value.trim();
  if(!name){showToast('Name erforderlich');return;}
  const newCfg={...kalCfg,[name]:{items:[]}};
  await db.collection('config').doc('main').update({kalkulatorConfig:newCfg});
  mClose(); showToast('Zelttyp erstellt'); setTimeout(()=>openEditKal(name),200);
}

async function addAdmin(){
  const email=(document.getElementById('adm-new-email')?.value||'').trim().toLowerCase();
  if(!email||!email.includes('@')){showToast('Ungültige E-Mail');return;}
  if(admEmails.includes(email)){showToast('Bereits Admin');return;}
  await db.collection('config').doc('main').update({adminEmails:[...admEmails,email]});
  showToast(`${email} ist jetzt Admin`);
}

async function rmAdmin(email){
  if(admEmails.length<=1){showToast('Mindestens 1 Admin erforderlich');return;}
  if(!confirm(`${email} als Admin entfernen?`)) return;
  await db.collection('config').doc('main').update({adminEmails:admEmails.filter(e=>e!==email)});
  showToast('Admin entfernt');
}

// ═══════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(html){
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function mClose(e){
  if(e&&e.target!==document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-body').innerHTML='';
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this){this.classList.remove('open');document.getElementById('modal-body').innerHTML='';}
});

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmtDate(ts){if(!ts) return '';try{const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('de-DE');}catch{return '';}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function emptyState(msg){return `<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg><p>${msg}</p></div>`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}

async function init(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  const saved=localStorage.getItem('gw_u');
  if(saved){
    try{
      usr=JSON.parse(saved);
      if(!db) throw new Error('Firebase not ready');
      await launchApp();
    }catch(e){localStorage.removeItem('gw_u');}
  }
}
init();
</script>
